{% extends "base.html" %}

{% block content %}

<h2>
{% if object %}
Edit Task
{% else %}
Create Task
{% endif %}
</h2>

<form method="post" enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-success">
    {% if object %}
        Update
    {% else %}
        Create
    {% endif %}
    </button>

</form>

{% endblock %}
