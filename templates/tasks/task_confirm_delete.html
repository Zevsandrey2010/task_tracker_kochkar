{% extends "base.html" %}

{% block content %}

<h2>Видалення</h2>

<p>
    Ви впевнені, що хочете видалити
    <strong>{{ object.title }}</strong>?
</p>

<form method="post">

    {% csrf_token %}

    <button class="btn btn-danger">
        Видалити
    </button>

    <a href="{% url 'tasks:task_list' %}" class="btn btn-secondary">
        Скасувати
    </a>

</form>

{% endblock %}
